version: '3.8'

services:
  nginx:
    image: nginx:latest
    ports:
      - "6987:80"
    volumes:
      - ./webserver/default.conf:/etc/nginx/conf.d/default.conf
      - ./webserver/src:/var/www/html
    depends_on:
      - webserver
    environment:
      - TZ=Asia/Seoul
    networks:
      - app-network

  webserver:
    build:
      context: ./webserver
      dockerfile: dockerfile   # 로컬 빌드(arch 무관: Apple Silicon 포함)
    image: qorwlsdk1995/my-php-app:latest  # 빌드 결과 태그
    extra_hosts:
      - "host.docker.internal:host-gateway"  # MORI(host:18000) 접근용
    ports:
      - "9555:9000"  # Nginx와 연결하기 위해 포트 열기
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Docker 소켓 마운트
      - ./webserver/www.conf:/usr/local/etc/php-fpm.d/www.conf  # PHP-FPM 설정
      - ./webserver/src:/var/www/html  # 소스 코드 공유
      - ./webserver/entrypoint.sh:/entrypoint.sh  # 시작 스크립트
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    environment:
      - TZ=Asia/Seoul
      - FROM_EMAIL=trivy-scanner@monitor.rmstudio.co.kr
      - FROM_NAME=Trivy Scanner
      - ALERT_EMAIL=qorwlsdk1995@naver.com
      - ALERT_ON_CRITICAL=true
      - ALERT_THRESHOLD=HIGH
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # Slack Webhook 설정 (여러 URL은 쉼표로 구분)
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      # Google Spreadsheet 설정
      - GOOGLE_SHEET_ID=${GOOGLE_SHEET_ID:-}
      - GOOGLE_SERVICE_ACCOUNT_KEY=/var/www/html/google-credentials.json
      # Agent 설정 (TRIVY_AGENT_URL=disabled 로 설정하면 직접 실행 모드)
      - AGENT_API_TOKEN=${AGENT_API_TOKEN:-default-agent-token-change-me}
      - TRIVY_AGENT_URL=${TRIVY_AGENT_URL:-http://trivy-agent:8888}
      # MORI-SOC API (CSOP Zabbix context / evidence 연동)
      - MORI_API_URL=${MORI_API_URL:-http://host.docker.internal:18000}
      # 인증: 토큰 우선(X-MORI-Token/Bearer), 없으면 세션 로그인 폴백
      - MORI_INGEST_TOKEN=${MORI_INGEST_TOKEN:-}
      - MORI_USER=${MORI_USER:-admin}
      - MORI_PASSWORD=${MORI_PASSWORD:-}
    depends_on:
      - mysql
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    environment:
      - TZ=Asia/Seoul
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=trivy_db
      - MYSQL_USER=trivy_user
      - MYSQL_PASSWORD=trivy_password
    ports:
      - "9756:3306"
    volumes:
      - mysql_data:/var/lib/mysql  # 🚨 데이터 영구 저장
    networks:
      - app-network

  # 🤖 Trivy Agent - 로컬 스캐너 에이전트
  trivy-agent:
    build: ./trivy-agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=Asia/Seoul
      - AGENT_TOKEN=${AGENT_API_TOKEN:-default-agent-token-change-me}
      - AGENT_ID=local-agent
      - MODE=api  # api = HTTP API만, push = Central 서버에 푸시, both = 둘 다
      - API_PORT=8888
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  auto_scan:
    build: ./auto_scan
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=Asia/Seoul
      - API_URL=http://nginx:80/auto_scan.php
    depends_on:
      - nginx
      - trivy-agent
    restart: unless-stopped
    networks:
      - app-network

  # Prometheus - 메트릭 수집
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    environment:
      - TZ=Asia/Seoul
    restart: unless-stopped
    networks:
      - app-network

  # Grafana - 시각화
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - TZ=Asia/Seoul
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      # 익명 접근 허용 (로그인 없이 대시보드 보기)
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_NAME=Main Org.
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      # 임베딩 허용 (iframe 사용시)
      - GF_SECURITY_ALLOW_EMBEDDING=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - app-network

  # cAdvisor - 컨테이너 메트릭 수집
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    environment:
      - TZ=Asia/Seoul
    restart: unless-stopped
    networks:
      - app-network

  # Postfix - 메일 발송 서버
  mailserver:
    image: boky/postfix
    environment:
      - TZ=Asia/Seoul
      - ALLOWED_SENDER_DOMAINS=monitor.rmstudio.co.kr rmstudio.co.kr
      - HOSTNAME=mail.monitor.rmstudio.co.kr
    restart: unless-stopped
    networks:
      - app-network

  # 🔭 Loki - 로그 저장소
  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    environment:
      - TZ=Asia/Seoul
    restart: unless-stopped
    networks:
      - app-network

  # 🔭 Promtail - 로그 수집기
  promtail:
    image: grafana/promtail:2.9.0
    user: root  # 🚨 Docker 로그 파일 읽기 권한 필요
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    environment:
      - TZ=Asia/Seoul
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - app-network

  # 🦅 Falco - 런타임 위협 탐지 (선택사항)
  # ⚠️ 주의: Falco는 Linux 커널 모듈이 필요합니다.
  # Docker Desktop(Mac/Windows)에서는 동작하지 않습니다.
  # Linux 서버에서만 활성화하세요.
  # falco:
  #   image: falcosecurity/falco:latest
  #   privileged: true
  #   volumes:
  #     - /var/run/docker.sock:/host/var/run/docker.sock:ro
  #     - /dev:/host/dev:ro
  #     - /proc:/host/proc:ro
  #     - /boot:/host/boot:ro
  #     - /lib/modules:/host/lib/modules:ro
  #     - /usr:/host/usr:ro
  #     - /etc:/host/etc:ro
  #     - ./falco/falco.yaml:/etc/falco/falco.yaml
  #   environment:
  #     - TZ=Asia/Seoul
  #   restart: unless-stopped
  #   networks:
  #     - app-network

  # 🦅 Falco Sidekick - Falco 이벤트를 Loki로 전송
  # falco-sidekick:
  #   image: falcosecurity/falcosidekick:latest
  #   environment:
  #     - TZ=Asia/Seoul
  #     - LOKI_HOSTPORT=http://loki:3100
  #   depends_on:
  #     - falco
  #     - loki
  #   restart: unless-stopped
  #   networks:
  #     - app-network

networks:
  app-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  mysql_data:      # 🚨 MySQL 데이터 영구 저장
  loki_data:       # 🔭 Loki 로그 데이터

